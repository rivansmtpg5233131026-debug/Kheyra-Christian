<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Kheyra ❤️ Christian</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #ff9a9e, #fad0c4, #fbc2eb);
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
      cursor: pointer;
    }

    .container {
      text-align: center;
      z-index: 2;
    }

    .text {
      font-size: 48px;
      font-weight: 600;
      color: white;
      text-shadow: 0 0 15px rgba(0,0,0,0.4);
      animation: zoomFade 3s ease forwards;
    }

    .subtext {
      margin-top: 10px;
      font-size: 18px;
      color: white;
      opacity: 0;
      animation: fadeIn 4s ease forwards;
      animation-delay: 2s;
    }

    @keyframes zoomFade {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    .heart {
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      transform: rotate(45deg);
      animation: floatUp linear infinite;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 20px;
      height: 20px;
      background: red;
      border-radius: 50%;
    }

    .heart::before { top: -10px; left: 0; }
    .heart::after { left: -10px; top: 0; }

    @keyframes floatUp {
      0% { bottom: -20px; opacity: 1; transform: translateX(0) rotate(45deg); }
      100% { bottom: 110%; opacity: 0; transform: translateX(50px) rotate(45deg); }
    }

    .sparkle {
      position: absolute;
      width: 5px;
      height: 5px;
      background: white;
      border-radius: 50%;
      animation: sparkleAnim 2s linear infinite;
    }

    @keyframes sparkleAnim {
      0% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(2); }
    }

    .hint {
      position: absolute;
      bottom: 20px;
      color: white;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>
<body onclick="startMusic()">

  <div class="container">
    <div class="text">Kheyra ❤️ Christian</div>
    <div class="subtext">Forever & Always 💖</div>
  </div>

  <div class="hint">Klik di mana saja 💖</div>

  <!-- AUDIO -->
  <audio id="music" loop autoplay>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const music = document.getElementById('music');

    // autoplay attempt (beberapa browser akan blok)
    window.onload = () => {
      music.volume = 0;
      music.play().catch(() => {
        // kalau gagal autoplay, tunggu klik user
        console.log(\"Autoplay diblok, tunggu klik...\");
      });
    };

    function startMusic() {
      music.play();

      // fade in volume 🔥
      let vol = 0;
      const fade = setInterval(() => {
        if (vol < 0.5) {
          vol += 0.05;
          music.volume = vol;
        } else {
          clearInterval(fade);
        }
      }, 200);
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.animationDuration = (3 + Math.random() * 2) + 's';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 5000);
    }

    function createSparkle() {
      const sparkle = document.createElement('div');
      sparkle.classList.add('sparkle');
      sparkle.style.left = Math.random() * window.innerWidth + 'px';
      sparkle.style.top = Math.random() * window.innerHeight + 'px';
      document.body.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 2000);
    }

    setInterval(createHeart, 250);
    setInterval(createSparkle, 150);
  </script>

</body>
</html>
